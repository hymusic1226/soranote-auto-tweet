name: ソラノテ 自動投稿

on:
  schedule:
    # 朝7時 JST (UTC 22:00 前日)
    - cron: '0 22 * * *'
    # 夜21時 JST (UTC 12:00)
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      post_type:
        description: '投稿タイプ (morning / evening)'
        required: true
        default: 'morning'

jobs:
  morning:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 22')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.post_type == 'morning')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install tweepy google-genai python-dotenv
      - name: 朝の投稿
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python post_tweet.py morning

  evening:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 12')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.post_type == 'evening')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install tweepy google-genai python-dotenv
      - name: 夜の投稿
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python post_tweet.py evening
