name: ソラノテ 自動投稿

on:
  schedule:
    # 朝7時 JST (UTC 22:00 前日)
    - cron: '0 22 * * *'
    # 夜21時 JST (UTC 12:00)
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      post_type:
        description: '投稿タイプ (morning / evening)'
        required: true
        default: 'morning'

jobs:
  tweet:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存関係インストール
        run: pip install tweepy google-genai python-dotenv

      - name: 投稿タイプを判定
        id: determine_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "post_type=${{ github.event.inputs.post_type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "22" ]; then
              echo "post_type=morning" >> $GITHUB_OUTPUT
            else
              echo "post_type=evening" >> $GITHUB_OUTPUT
            fi
          fi

      - name: X に投稿
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python post_tweet.py ${{ steps.determine_type.outputs.post_type }}
